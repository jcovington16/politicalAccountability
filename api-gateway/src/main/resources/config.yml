server:
  applicationConnectors:
    - type: http
      port: 8080  # API Gateway HTTP Port
  adminConnectors:
    - type: http
      port: 8081  # Admin Port

logging:
  level: INFO
  appenders:
    - type: console
      timeZone: UTC
    - type: file
      currentLogFilename: logs/api-gateway.log
      archivedLogFilenamePattern: logs/api-gateway-%d.log.gz
      archivedFileCount: 5
      timeZone: UTC
      threshold: INFO

# Local Docker defaults live in AppConfig. In shared environments, provide
# DATABASE_URL, DATABASE_USER, and DATABASE_PASSWORD through environment config.
databaseDriverClass: org.postgresql.Driver
databaseMaxConnections: 10

minioBucket: "political-media"

cors:
  allowedOrigins: "http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:8082"
  allowedMethods: "OPTIONS,GET,HEAD"
  allowedHeaders: "X-Requested-With,Content-Type,Accept,Origin,X-Admin-Token"
  allowCredentials: false
